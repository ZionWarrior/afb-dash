name: Dashboard aktualisieren

on:
  schedule:
    # Laeuft taeglich um 07:30 und 19:30 Uhr deutscher Zeit (05:30/17:30 UTC)
    - cron: "30 5,17 * * *"
  workflow_dispatch:   # zusaetzlich manuell startbar (Button "Run workflow")

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance pandas
      - run: python Portfolio_AFB_Script.py
      - run: mkdir -p site && cp Portfolio_AFB.html site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
